services:
  - type: web
    name: tompuco-loan-system
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-render.txt
      python manage.py collectstatic --noinput
    startCommand: bash startup.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SETTINGS_MODULE
        value: tompuco.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: postgresql://postgres:Jelaica_db123@db.tliadsitmldanbwgfkqj.supabase.co:5432/postgres?sslmode=require