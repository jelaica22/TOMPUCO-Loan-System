services:
  - type: web
    name: tompuco-loan-system
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput || echo "Migrations will run on startup"
    startCommand: gunicorn tompuco.wsgi:application --bind 0.0.0.0:10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SETTINGS_MODULE
        value: tompuco.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: postgresql://postgres:Jelaica_db123@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require