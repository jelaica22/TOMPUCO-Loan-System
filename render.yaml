services:
  - type: web
    name: tompuco-loan-system
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python full_reset.py && python manage.py collectstatic --noinput && python -c "import os, django; os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'tompuco.settings'); django.setup(); from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.create_superuser('admin', 'admin@tompuco.com', 'admin123') if not User.objects.filter(username='admin').exists() else print('Superuser exists')"
    startCommand: gunicorn tompuco.wsgi:application --bind 0.0.0.0:10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SETTINGS_MODULE
        value: tompuco.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
