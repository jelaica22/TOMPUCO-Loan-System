services:
  - type: web
    name: tompuco-loan-system
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p 10000 tompuco.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: ALLOWED_HOSTS
        value: .onrender.com,tompuco-loan-system.onrender.com
      - key: DISABLE_COLLECTSTATIC
        value: 0
    healthCheckPath: /login/

databases:
  - name: tompuco-db
    plan: free
    databaseName: tompuco_db
    user: tompuco_user
    ipAllowList: []
