{% extends 'main/base.html' %}
{% load static %}

{% block title %}Admin Redirect - ToMPuCo{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body p-5">
                    <i class="bi bi-shield-lock fs-1 text-primary mb-3"></i>
                    <h3 class="mb-3">Admin Access</h3>
                    <p class="text-muted mb-4">
                        You are logged in as an administrator. Please use the admin panel.
                    </p>
                    <div class="d-grid gap-3">
                        <a href="/superadmin/" class="btn btn-primary btn-lg">
                            <i class="bi bi-speedometer2"></i> Go to Admin Panel
                        </a>
                        <a href="{% url 'main:custom_logout' %}" class="btn btn-outline-secondary">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
