{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>{% block title %}TOMPUCO ALMS{% endblock %}</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --teal-deep: #0a5a5a;
            --teal-dark: #0d6e6e;
            --teal-primary: #1a8a8a;
            --teal-medium: #2a9e9e;
            --teal-soft: #3db5b5;
            --teal-light: #5cc9c9;
            --text-light: #ffffff;
            --text-dark: #1a2a3a;
            --text-secondary: #5a6e7a;
            --text-muted: #8a9aa8;
            --border-color: #e2e8f0;
            --bg-card: #ffffff;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--teal-deep) 0%, var(--teal-primary) 50%, var(--teal-medium) 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background shapes */
        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -150px;
            right: -150px;
            animation: float 18s infinite ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 22s infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            50% {
                transform: translate(40px, 40px) rotate(5deg);
            }
        }

        /* Main Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Auth Card */
        .auth-card {
            width: 100%;
            max-width: 1100px;
            background: var(--bg-card);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
        }

        /* Auth Header (hidden) */
        .auth-header {
            display: none;
        }

        /* Auth Body */
        .auth-body {
            padding: 0;
            background: var(--bg-card);
        }

        /* Alert Styles */
        .alert {
            border-radius: 12px;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            border: none;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
        }

        .alert-danger, .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .alert i {
            font-size: 1.1rem;
        }

        .btn-close {
            font-size: 0.7rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem;
            }
            .auth-card {
                max-width: 100%;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--teal-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--teal-deep);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Main Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"> </script>
    <script>                // Force add favicon to dashboard
        (function() {
            // Remove any existing favicons
            var oldLinks = document.querySelectorAll("link[rel*='icon']");
            oldLinks.forEach(function(link) {
                link.parentNode.removeChild(link);
            });

            // Create new favicon with your actual logo
            var link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/png';
            link.href = "{% static 'images/logo.png' %}?v=" + Date.now();
            document.head.appendChild(link);

            var link2 = document.createElement('link');
            link2.rel = 'shortcut icon';
            link2.type = 'image/png';
            link2.href = "{% static 'images/logo.png' %}?v=" + Date.now();
            document.head.appendChild(link2);

            console.log('Favicon added to dashboard');
        })();</script>

    {% block extra_js %}{% endblock %}
</body>
</html>
