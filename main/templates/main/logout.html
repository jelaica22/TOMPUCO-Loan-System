<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - ToMPuCo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
        .logout-card {
            border-radius: 20px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card logout-card shadow">
                    <div class="card-body text-center p-5">
                        <div class="mb-4">
                            <i class="bi bi-check-circle-fill text-success fs-1"></i>
                        </div>
                        <h3 class="mb-3">Successfully Logged Out</h3>
                        <p class="text-muted mb-4">
                            Thank you for using ToMPuCo Cooperative Portal.
                            You have been safely logged out.
                        </p>
                        <div class="d-grid gap-2">
                            <a href="{% url 'main:login' %}" class="btn btn-primary rounded-pill py-2">
                                <i class="bi bi-box-arrow-in-right"></i> Login Again
                            </a>
                            <a href="{% url 'main:landing_page' %}" class="btn btn-outline-secondary rounded-pill py-2">
                                <i class="bi bi-house"></i> Return to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
