{% extends 'main/base.html' %}
{% load static %}

{% block title %}Logged Out - ToMPuCo{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <div class="card-body p-5">
                    <i class="bi bi-box-arrow-right fs-1 text-success mb-3"></i>
                    <h3 class="mb-3">You have been logged out</h3>
                    <p class="text-muted mb-4">
                        Thank you for using ToMPuCo Cooperative portal.
                        You have been successfully logged out.
                    </p>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'main:login' %}" class="btn btn-primary rounded-pill px-4">
                            <i class="bi bi-box-arrow-in-right"></i> Login Again
                        </a>
                        <a href="{% url 'main:landing_page' %}" class="btn btn-outline-secondary rounded-pill px-4">
                            <i class="bi bi-house"></i> Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
