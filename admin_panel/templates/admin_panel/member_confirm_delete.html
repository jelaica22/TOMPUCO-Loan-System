{% extends 'admin_panel/base.html' %}

{% block title %}Delete Member{% endblock %}
{% block page_title %}Delete Member{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center">
        <h4>Confirm Delete</h4>
        <p>Are you sure you want to delete member <strong>{{ member.first_name }} {{ member.last_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'admin_panel:members_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
