{% extends 'admin_panel/base.html' %}

{% block title %}Delete User{% endblock %}
{% block page_title %}Delete User{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body text-center">
        <h4>Confirm Delete</h4>
        <p>Delete user <strong>{{ user.username }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'admin_panel:users_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
