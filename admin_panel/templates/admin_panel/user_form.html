{% extends 'admin_panel/base.html' %}

{% block title %}{{ action }} User{% endblock %}
{% block page_title %}{{ action }} User{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-white">
        <h5 class="mb-0"><i class="bi bi-person-{{ action|lower }} me-2"></i>{{ action }} User</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Username *</label>
                    <input type="text" name="username" class="form-control" value="{{ user.username|default:'' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Password {% if action == 'Create' %}*{% endif %}</label>
                    <input type="password" name="password" class="form-control" {% if action == 'Create' %}required{% endif %}>
                    {% if action == 'Edit' %}<small class="text-muted">Leave blank to keep current password</small>{% endif %}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <div class="form-check mb-2">
                        <input type="checkbox" name="is_staff" class="form-check-input" id="isStaff" {% if user.is_staff %}checked{% endif %}>
                        <label class="form-check-label" for="isStaff">Staff Status</label>
                    </div>
                    <div class="form-check mb-2">
                        <input type="checkbox" name="is_superuser" class="form-check-input" id="isSuperuser" {% if user.is_superuser %}checked{% endif %}>
                        <label class="form-check-label" for="isSuperuser">Superuser Status</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {% if user.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="isActive">Active Status</label>
                    </div>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'admin_panel:users_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
